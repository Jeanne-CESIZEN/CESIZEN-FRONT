name: CI - Front

# Pipeline front-end :
#  - PR vers develop/main : ESLint + tests E2E (Playwright) + scan deps + secrets
#  - Push develop         : idem + build, scan image & push :staging
#  - Push main            : idem + build, scan image & push :prod
#  - Tag git v*           : idem + push :prod + :vX.Y.Z (release tracée)
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
    tags: ["v*"]
  workflow_dispatch:

# Annule un run précédent encore en cours sur la même réf
concurrency:
  group: ci-front-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-e2e:
    name: Lint, build & tests E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Analyse statique du code (ESLint)
        run: npm run lint

      - name: Installation du navigateur Playwright
        run: npx playwright install --with-deps chromium

      - name: Tests End-to-End (Playwright)
        # webServer (playwright.config) build et sert l'app automatiquement
        run: npm run test:e2e

      - name: Publication du rapport en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Scan de vulnérabilités des dépendances (Trivy fs) ──────────────────────
  security:
    name: Scan dépendances (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Rapport des vulnérabilités (HIGH/CRITICAL, informatif)
        run: trivy fs --scanners vuln --severity HIGH,CRITICAL --no-progress --exit-code 0 .

      - name: Échec si vulnérabilité CRITICAL corrigeable
        run: trivy fs --scanners vuln --severity CRITICAL --ignore-unfixed --no-progress --exit-code 1 .

  # ─── Détection de secrets commités (gitleaks) ───────────────────────────────
  gitleaks:
    name: Détection de secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan des secrets
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --redact --verbose

  # ─── Build + scan de l'image + publication sur GHCR ─────────────────────────
  # VITE_API_URL est injecté au build (Vite l'inline) -> une image par env.
  # Tags : develop -> :staging | main -> :prod | tag v* -> :prod + :vX.Y.Z
  build-push:
    name: Build, scan & push (GHCR)
    needs: [build-and-e2e, security, gitleaks]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      IMAGE_NAME: ghcr.io/jeanne-cesizen/cesizen-front
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Détermination de l'environnement, de l'URL d'API et des tags
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION=""
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV=prod
            API_URL="${{ vars.VITE_API_URL_PROD }}"
            VERSION="${{ github.ref_name }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV=prod
            API_URL="${{ vars.VITE_API_URL_PROD }}"
          else
            ENV=staging
            API_URL="${{ vars.VITE_API_URL_STAGING }}"
          fi
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${ENV}"
            echo "${IMAGE_NAME}:sha-${SHA}"
            [ -n "$VERSION" ] && echo "${IMAGE_NAME}:${VERSION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configuration de Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build local pour scanner avant de pousser (cache GHA peuplé)
      - name: Build local (pour scan, sans push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          build-args: |
            VITE_API_URL=${{ steps.meta.outputs.api_url }}
          tags: scan-target:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Trivy sur l'image -> SARIF (informatif)
      - name: Trivy — rapport image (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:latest
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF dans l'onglet Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # 3. Gate strict
      - name: Trivy — gate (échec si CRITICAL corrigeable)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:latest
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # 4. Push sur GHCR (rebuild instantané via cache)
      - name: Push sur GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ steps.meta.outputs.api_url }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
