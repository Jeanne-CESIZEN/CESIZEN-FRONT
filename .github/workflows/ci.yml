name: CI - Front

# Pipeline front-end : analyse statique (ESLint), build de production
# puis tests End-to-End avec Selenium sur l'application servie.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

# Annule un run précédent encore en cours sur la même réf
concurrency:
  group: ci-front-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-e2e:
    name: Lint, build & tests Selenium
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Analyse statique du code (ESLint)
        run: npm run lint

      - name: Build de production
        run: npm run build

      - name: Démarrage du serveur de prévisualisation
        run: npm run preview &

      - name: Attente du démarrage du serveur
        run: |
          npx --yes wait-on http://localhost:4173 --timeout 60000

      - name: Tests End-to-End (Selenium)
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:4173

  # ─── Build de l'image + publication sur GHCR ────────────────────────────────
  # Uniquement sur push/dispatch (pas sur les PR). Le tag et l'URL d'API dépendent
  # de la branche :  develop -> :staging (VITE_API_URL_STAGING)
  #                   main    -> :prod    (VITE_API_URL_PROD)
  # Comme Vite inline l'URL au build, chaque image est bien spécifique à son env.
  build-push:
    name: Build & Push (GHCR)
    needs: build-and-e2e
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/jeanne-cesizen/cesizen-front
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Détermination de l'environnement, de l'URL d'API et du SHA
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "api_url=${{ vars.VITE_API_URL_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
            echo "api_url=${{ vars.VITE_API_URL_STAGING }}" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configuration de Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ steps.meta.outputs.api_url }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}
            ${{ env.IMAGE_NAME }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
